document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  const FONT_MIME = /^(font[/]|application[/](x-)?font-|application[/]vnd\.ms-fontobject)/i;
  const MIME_TOKEN = /^[\w.+-]+[/][\w.+-]+$/;
  function toBase64(bytes) {
    let bin = '';
    for (let i = 0; i < bytes.length; i += 0x8000) {
      bin += String.fromCharCode.apply(null, bytes.subarray(i, i + 0x8000));
    }
    return btoa(bin);
  }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    // Failed resource loads (CSP-blocked links, scripts, images) fire plain
    // events at the element — warn only; real JS errors carry message/error.
    if (!e.message && !e.error && e.target && e.target !== window) {
      console.warn('[bundle] resource failed to load:',
        e.target.tagName, String(e.target.src || e.target.href || ''));
      return;
    }
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    const resourceBlobs = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        if (FONT_MIME.test(entry.mime) && MIME_TOKEN.test(entry.mime)) {
          // Strict artifact hosts allow font-src data: but not blob:.
          blobUrls[uuid] = 'data:' + entry.mime + ';base64,' +
            (entry.compressed ? toBase64(finalBytes) : entry.data);
        } else {
          const blob = new Blob([finalBytes], { type: entry.mime });
          blobUrls[uuid] = URL.createObjectURL(blob);
          resourceBlobs[blobUrls[uuid]] = blob;
        }
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        const blob = new Blob([], { type: entry.mime });
        blobUrls[uuid] = URL.createObjectURL(blob);
        resourceBlobs[blobUrls[uuid]] = blob;
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    // Artifact-host CSP (connect-src 'self') refuses fetch() of blob: URLs —
    // consumers read these Blobs directly. Survives the swap like the error sink.
    window.__resourceBlobs = resourceBlobs;

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).replace(/<\//g, '<\\/') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: read and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const pre = resourceBlobs[s.src.split('#')[0]];
        s.textContent = pre ? await pre.text() : await (await fetch(s.src)).text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

    the full four-color set. Cyan and magenta are the system's own accents;\n     this yellow completes them, muted to the same press-ink register. A\n     print treatment color, not an interface accent — body copy and chrome\n     never take it. */\n  --color-process-yellow: #a9b7ae;\n\n  --font-heading: \"Source Serif 4\", system-ui, sans-serif;\n  --font-heading-weight: 600;\n  --font-body: \"Source Serif 4\", system-ui, sans-serif;\n\n  --space-1: 5.0px;\n  --space-2: 10.0px;\n  --space-3: 15.0px;\n  --space-4: 20.0px;\n  --space-6: 30.0px;\n  --space-8: 40.0px;\n\n  --radius-sm: 1px;\n  --radius-md: 2px;\n  --radius-lg: 4px;\n\n  /* Elevation — derived from the ground: soft ink-tinted shadows on a\n     light theme, a hairline edge + ambient darkness on a dark one. */\n  --shadow-sm: 0 1px 2px color-mix(in srgb, #2d2b2b 14%, transparent);\n  --shadow-md: 0 3px 10px color-mix(in srgb, #2d2b2b 16%, transparent);\n  --shadow-lg: 0 12px 32px color-mix(in srgb, #2d2b2b 22%, transparent);\n}\n\nbody {\n  background: var(--color-bg);\n  color: var(--color-text);\n  font-family: var(--font-body);\n}\nh1, h2, h3, h4 { font-family: var(--font-heading); font-weight: var(--font-heading-weight); }\n\n.halftone{position:relative;filter:grayscale(0.35) contrast(1.15);overflow:hidden}\n.halftone::after{content:\"\";position:absolute;inset:0;pointer-events:none;\n  background-image:radial-gradient(circle,rgba(0,0,0,0.22) 30%,transparent 32%);\n  background-size:3px 3px;mix-blend-mode:multiply}\n\n/* The four-color separation treatment (review round 3) — a photograph\n   printed as its misregistered process plates, after the Catalogue Three\n   grammar. Markup: a figure.cmyk holding five copies of the image — the\n   first is the layout sizer (hidden), then one per plate, each tagged\n   .sep-c/.sep-m/.sep-y/.sep-k. The plates are extracted live by the SVG\n   feColorMatrix filters in print-plates.js, the system's own defs —\n   inlined in the compiled bundle every template page loads, and a\n   page that links styles.css directly adds\n   <script src=\"print-plates.js\"><\u002Fscript> itself (the defs must be in\n   the document: a data-URI filter reference would not survive Chromium,\n   and external-file references are unreliable across engines) — nudged\n   a few pixels out of register, and multiplied\n   onto the paper ground; the halftone dot screens the recombined print.\n   The plate offsets live with the deck's projection-scale CSS, since\n   misregistration is sized to the output. */\n.cmyk{position:relative;overflow:hidden;background:var(--color-bg)}\n.cmyk img:first-child{opacity:0} /* layout sizer AND the alt-bearing image — opacity\n  keeps it in the accessibility tree (visibility:hidden would drop the figure's only\n  description); fully transparent, it adds nothing to the multiply backdrop */\n.cmyk img+img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;mix-blend-mode:multiply}\n.cmyk .sep-c{filter:url(#sep-c)}\n.cmyk .sep-m{filter:url(#sep-m)}\n.cmyk .sep-y{filter:url(#sep-y)}\n.cmyk .sep-k{filter:url(#sep-k)}\n.cmyk::after{content:\"\";position:absolute;inset:0;pointer-events:none;\n  background-image:radial-gradient(circle,rgba(0,0,0,0.22) 30%,transparent 32%);\n  background-size:3px 3px;mix-blend-mode:multiply}\n\n/* The one-image separation (review round 9, promoted from the deck in the\n   landing divergence) — the same four plates as ONE compound filter,\n   #sep-all in print-plates.js, for a single swappable image: a .print\n   wrapper inside the figure holds one <image-slot>, and the filter\n   extracts, offsets and multiplies the plates live from whatever the slot\n   shows. Markup: figure.cmyk > .print > image-slot (the page sizes the\n   .print — aspect-ratio, or absolute fill for bleeds). Hover resolves\n   the print into the photograph — the pressman checking registration on\n   the light table — so the source shows crisp and any swap chrome stays\n   legible; only the reduced-motion fallback below still lifts as a\n   single cut (a url() filter cannot CSS-transition; the press driver\n   animates the defs instead). */\n.cmyk .print{position:relative;width:100%;filter:url(#sep-all)}\n/* no hover end-state swap: the press driver (print-plates.js) eases the\n   plates into register while purifying their inks to the pure-process\n   separation on the same curve, so the converged four-plate merge IS\n   the photograph (their multiply equals SourceGraphic by construction)\n   — no cut anywhere on the animated path */\n@media (prefers-reduced-motion: reduce), (hover: none), (pointer: coarse) {\n  .cmyk .print:hover{filter:none} /* without the driver (it stands down on\n    exactly these conditions), hover stays the old single cut to the\n    crisp source */\n}\n.cmyk .print image-slot{width:100%;height:100%;display:block}\n\n/* The plate numeral (review rounds 3-4) — display figures set as\n   misregistered process plates, the catalog's cover grammar. Review\n   round 4 (Barron): THREE plates — C, M, Y only, no black plate — so the\n   dark core comes entirely from the C×M×Y multiply overlap (the inks\n   product to exact black), with the fringes the registration drift; and\n   the spread pulled in by half (less jumbled: one figure with plate\n   fringes rather than figures sliding apart). Markup: a .cmyk-num holding\n   a .paper span (the white of the sheet: the glyph's union, built from\n   offset text-shadow copies) and three .plate spans. The construction\n   carries its own ground (--cmyk-num-ground, defaulting to paper) painted\n   on its padding box, so the multiply plates always have their backdrop\n   even inside an isolated stacking context (entrance animations); the\n   padding bleeds wider than any plate offset and the negative margin\n   hands the layout box back. Offsets are em-scaled to the glyph. The\n   .paper span carries the text once for assistive tech; the .plate spans\n   are aria-hidden repeats. */\n.cmyk-num{--cmyk-num-ground:var(--color-bg);\n  position:relative;width:fit-content;line-height:0.9;\n  font-feature-settings:\"pnum\" 1;\n  background:var(--cmyk-num-ground);padding:0.12em;margin:-0.12em}\n.cmyk-num .paper{color:var(--color-bg); /* the white of the sheet — always paper,\n  whatever the ground: the plates read as printed on paper even when the\n  surrounding page is ink */\n  text-shadow:0.036em 0.025em 0 var(--color-bg),-0.031em -0.023em 0 var(--color-bg)}\n.cmyk-num .plate{position:absolute;inset:0.12em;mix-blend-mode:multiply;\n  text-box:trim-both cap alphabetic /* the host trims to its cap box; each\n  absolute plate must trim its own line the same way, or its glyphs sit a\n  half-leading below the paper union */}\n.cmyk-num .plate-c{color:var(--color-accent)}\n\n/* The plate headline (divergence round 3, Barron: \"use both\" — the\n   photograph's plates AND the cover grammar's text plates, on the same\n   page). The same three-plate construction as .cmyk-num — paper span\n   carrying the real text, C/M/Y plate repeats, dark core from the\n   multiply overlap — at HALF the numeral's round-4 offsets: the serif's\n   display hairlines are thinner than the numeral strokes the spread was\n   measured on, and the full offsets swallow them whole (probed at the\n   hero's 80px — the fringes read as an anaglyph poster, not a breath\n   out of register) — recut for display\n   headlines that sit in running text blocks on the page's own paper:\n   no ground painting and no padding bleed (the numeral's ground exists\n   for isolated stacking contexts; a headline on the page multiplies\n   straight onto the sheet), no width:fit-content and no line-height\n   override (the host display class owns its metrics — apply this to\n   each .line, which is position:relative for its plates), and the\n   plates are inert to the hand (pointer-events/user-select none, so a\n   triple-click selects the headline once, not four times). Plates take\n   the same pointer lean as .cmyk-num. */\n.cmyk-head{position:relative}\n.cmyk-head .paper{color:var(--color-bg);\n  text-shadow:0.027em 0.0185em 0 var(--color-bg),-0.0245em -0.0175em 0 var(--color-bg)\n  /* the union's copies sit at the construction's halved plate offsets\n     PLUS the full lean (0.018+0.009 / 0.0125+0.006, and mirrored), so\n     the union still backs the plates at viewport-edge lean — invisible\n     on the page's own paper, load-bearing on any other ground */}\n.cmyk-head .plate{position:absolute;inset:0;mix-blend-mode:multiply;\n  pointer-events:none;user-select:none;\n  text-box:trim-both cap alphabetic /* match the host's trim, or the\n  plates sit a half-leading below the paper union */}\n.cmyk-head .plate-c{color:var(--color-accent)}\n.cmyk-head .plate-m{color:var(--color-accent-2);\n  translate:calc(0.018em + 0.009em*var(--press-nx, 0)) calc(0.0125em + 0.006em*var(--press-ny, 0))}\n.cmyk-head .plate-y{color:var(--color-process-yellow);\n  translate:calc(-0.0155em + 0.009em*var(--press-nx, 0)) calc(-0.0115em + 0.006em*var(--press-ny, 0))}\n.cmyk-num .plate-m{color:var(--color-accent-2);\n  translate:calc(0.036em + 0.018em*var(--press-nx, 0)) calc(0.025em + 0.0125em*var(--press-ny, 0))}\n.cmyk-num .plate-y{color:var(--color-process-yellow);\n  translate:calc(-0.031em + 0.018em*var(--press-nx, 0)) calc(-0.023em + 0.0125em*var(--press-ny, 0))}\n/* --press-nx/--press-ny: the pointer lean as a bare -1..1 factor,\n   published on :root by the press driver (print-plates.js) and zero\n   whenever the driver stands down. Each construction scales the lean to\n   its own spread (half of it, here as everywhere) so the moving plates\n   drift a breath toward the cursor and the C plate holds. */\n\n/* ══════════════════════════════════════════════════════════════════════════\n   Components — built with the tokens above. Plain CSS\n   on plain HTML: no JavaScript, no build step. Each class is documented in\n   readme.md and demonstrated in foundations/ and components/.\n   ══════════════════════════════════════════════════════════════════════ */\n\n*, *::before, *::after { box-sizing: border-box; }\nbody { margin: 0; font-size: 15px; line-height: 1.55; font-weight: 400; }\nh1, h2, h3, h4, h5, h6 {\n  font-family: var(--font-heading); font-weight: var(--font-heading-weight);\n  line-height: 1.12; letter-spacing: -0.015em; margin: 0 0 var(--space-2);\n}\nh1 { font-size: 42px; }\nh2 { font-size: 32px; }\nh3 { font-size: 25px; }\nh4 { font-size: 20px; }\nh5 { font-size: 16px; }\nh6 { font-size: 13px; }\nh6 { letter-spacing: 0.08em; text-transform: uppercase; }\np { margin: 0 0 var(--space-3); }\na { color: var(--color-accent); text-underline-offset: 3px; }\nimg { display: block; max-width: 100%; }\nfigure { margin: 0; }\nfigcaption {\n  font-size: 11px; margin-top: var(--space-1);\n  color: color-mix(in srgb, var(--color-text) 55%, transparent);\n}\n.text-muted { color: color-mix(in srgb, var(--color-text) 55%, transparent); }\n:focus { outline: none; }\n:focus-visible { outline: 2px solid var(--color-accent); outline-offset: 2px; }\n::selection { background: color-mix(in srgb, var(--color-accent) 30%, transparent); }\n\n/* — rules — */\n.hr {\n  height: 1px; border: 0; margin: var(--space-4) 0;\n  background: var(--color-divider);\n}\n\n/* — buttons — */\n.btn {\n  display: inline-flex; align-items: center; justify-content: center; gap: 6px;\n  cursor: pointer; text-decoration: none;\n  font-family: var(--font-heading); font-weight: var(--font-heading-weight);\n  font-size: 14px; line-height: 1.2; color: var(--color-text); /* matches the .input's 14px —\n     the pair sits side by side in sign-up rows */\n  background: transparent; border: 1px solid transparent;\n  padding: var(--space-2) calc(var(--space-3) * 1.2);\n  border-radius: var(--radius-md);\n}\n.btn svg { display: block; }\n.btn:disabled { opacity: 0.45; cursor: not-allowed; }\n.btn-primary { background: var(--color-accent); color: var(--color-bg); }\n.btn-primary:hover { background: var(--color-accent-600); }\n.btn-primary:active { background: var(--color-accent-700); }\n.btn-secondary { border-color: var(--color-divider); }\n.btn-secondary:hover { background: color-mix(in srgb, var(--color-text) 7%, transparent); }\n.btn-secondary:active { background: color-mix(in srgb, var(--color-text) 14%, transparent); }\n.btn-ghost { color: var(--color-accent); padding-inline: var(--space-1); }\n.btn-ghost:hover { background: color-mix(in srgb, var(--color-accent) 10%, transparent); }\n.btn-ghost:active { background: color-mix(in srgb, var(--color-accent) 18%, transparent); }\n.btn-icon { width: 36px; height: 36px; padding: 0; }\n.btn-block { width: 100%; margin-top: var(--space-2); }\n\n/* — forms — */\n.field > label {\n  display: block; font-size: 12px; margin-bottom: 5px;\n  color: color-mix(in srgb, var(--color-text) 70%, transparent);\n}\n.input {\n  width: 100%; min-height: 36px; padding: 6px 10px; font: inherit;\n  font-size: 14px; color: var(--color-text); caret-color: var(--color-accent);\n  background: var(--color-surface);\n  border: 1px solid var(--color-divider); border-radius: var(--radius-md);\n}\n.input::placeholder { color: color-mix(in srgb, var(--color-text) 65%, transparent); opacity: 1; }\n  /* explicit, measured: the browser default gray misses the 4.5:1 small-text bar on\n     the surface fill; 65% ink measures 4.8:1 there, still a step quieter than typed\n     text (opacity:1 overrides Firefox's default placeholder fade) */\n.input:hover { border-color: color-mix(in srgb, var(--color-text) 45%, transparent); }\n.input:focus-visible { border-color: var(--color-accent); outline-offset: 0; }\ntextarea.input { min-height: 90px; resize: vertical; }\n.radio { display: inline-flex; align-items: center; gap: 8px; cursor: pointer; font-size: 14px; }\n.radio input, .seg-opt input {\n  position: absolute; opacity: 0; width: 0; height: 0; pointer-events: none;\n}\n.radio .dot {\n  width: 16px; height: 16px; flex: none; border-radius: 50%;\n  border: 1.5px solid var(--color-divider);\n}\n.radio:hover .dot { border-color: var(--color-accent); }\n.radio input:checked + .dot {\n  border-color: var(--color-accent); background: var(--color-accent);\n  box-shadow: inset 0 0 0 4px var(--color-bg);\n}\n.radio input:focus-visible + .dot { outline: 2px solid var(--color-accent); outline-offset: 2px; }\n.seg {\n  display: inline-flex; overflow: hidden;\n  border: 1px solid var(--color-divider); border-radius: var(--radius-md);\n}\n.seg-opt {\n  display: inline-flex; align-items: center; gap: 6px;\n  padding: 7px 12px; font-size: 13px; cursor: pointer;\n}\n.seg-opt + .seg-opt { border-left: 1px solid var(--color-divider); }\n.seg-opt:has(input:checked) { background: var(--color-accent); color: var(--color-bg); }\n.seg-opt:not(:has(input:checked)):hover { background: color-mix(in srgb, var(--color-text) 7%, transparent); }\n.seg-opt:has(input:focus-visible) { outline: 2px solid var(--color-accent); outline-offset: -2px; }\n\n/* — cards — */\n.card {\n  display: flex; flex-direction: column; gap: var(--space-2);\n  padding: var(--space-3); border-radius: var(--radius-md); background: var(--color-surface);\n}\n.card-kicker { font-size: 10px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--color-accent); }\n.card-title {\n  font-family: var(--font-heading); font-weight: var(--font-heading-weight);\n  font-size: 17px; line-height: 1.2;\n}\n.card-body { margin: 0; font-size: 13px; opacity: 0.8; flex: 1; }\n.card-meta {\n  display: flex; align-items: center; gap: 6px; font-size: 11px;\n  color: color-mix(in srgb, var(--color-text) 50%, transparent);\n}\n.elev-sm { box-shadow: var(--shadow-sm); }\n.elev-md { box-shadow: var(--shadow-md); }\n.elev-lg { box-shadow: var(--shadow-lg); }\n\n/* — tags — */\n.tag {\n  display: inline-flex; align-items: center; font-size: 11px;\n  letter-spacing: 0.02em; padding: 3px 10px;\n  border-radius: calc(var(--radius-md) * 0.75);\n}\n.tag-accent { background: var(--color-accent-100); color: var(--color-accent-800); }\n.tag-accent-2 { background: var(--color-accent-2-100); color: var(--color-accent-2-800); }\n.tag-neutral { background: var(--color-neutral-100); color: var(--color-neutral-800); }\n.tag-outline { border: 1px solid var(--color-accent); color: var(--color-accent); }\n\n/* — navigation — */\n.nav {\n  display: flex; align-items: center; gap: var(--space-4);\n  padding: var(--space-3) var(--space-4);\n  border-bottom: none;\n}\n.nav-brand {\n  font-family: var(--font-heading); font-weight: var(--font-heading-weight);\n  font-size: 18px; margin-right: auto;\n}\n.nav a { color: inherit; text-decoration: none; font-size: 14px; }\n.nav a:hover, .nav a[aria-current='page'] { color: var(--color-accent); }\n\n/* — tables — */\n.table { width: 100%; border-collapse: collapse; font-size: 14px; }\n.table th {\n  text-align: left; font-size: 11px; letter-spacing: 0.08em; text-transform: uppercase;\n  color: color-mix(in srgb, var(--color-text) 60%, transparent);\n  padding: var(--space-2); border-bottom: 1px solid var(--color-divider);\n}\n.table td {\n  padding: var(--space-2);\n  border-bottom: 1px solid color-mix(in srgb, var(--color-text) 8%, transparent);\n}\n.table tbody tr:hover { background: color-mix(in srgb, var(--color-text) 4%, transparent); }\n\n/* — dialog — */\n.dialog-backdrop {\n  position: fixed; inset: 0; display: grid; place-items: center;\n  padding: var(--space-4);\n  background: color-mix(in srgb, var(--color-neutral-900) 50%, transparent);\n}\n.dialog {\n  width: min(440px, 100%); display: flex; flex-direction: column; gap: var(--space-3);\n  padding: var(--space-4); border-radius: var(--radius-lg);\n  background: var(--color-surface); box-shadow: var(--shadow-lg);\n}\n.dialog-title {\n  font-family: var(--font-heading); font-weight: var(--font-heading-weight);\n  font-size: 20px;\n}\n.dialog-body { font-size: 14px; opacity: 0.85; }\n.dialog-actions { display: flex; justify-content: flex-end; gap: var(--space-2); margin-top: var(--space-2); }\n\n<\u002Fstyle>\n<script src=\"05266b83-66df-4af3-8185-3976725c7351\"><\u002Fscript>\n<style>\nbody{margin:0;background:var(--color-bg);color:var(--color-text);font-family:var(--font-body);-webkit-font-smoothing:antialiased;overflow-x:clip}\na{color:var(--color-accent-700);text-decoration-color:var(--color-accent-300);text-underline-offset:3px}\na:hover{color:var(--color-accent-600)}\nbutton:focus-visible,a:focus-visible{outline:2px solid var(--color-accent);outline-offset:2px}\nh1,h2,h3,p{text-wrap:pretty}\n@media (max-width:768px){\n  .m-wrap{padding-left:20px !important;padding-right:20px !important}\n  .m-grid2{grid-template-columns:1fr !important}\n  .m-shots{gap:20px !important}\n}\n<\u002Fstyle>\n<\u002Fhelmet>\n<div class=\"m-wrap\" data-screen-label=\"Brokedex project\" style=\"max-width:1060px;margin:0 auto;padding:28px 36px 0\">\n\n  <header>\n    <div style=\"display:flex;justify-content:space-between;align-items:center;gap:24px;padding:14px 2px;font-size:15px;flex-wrap:wrap\">\n      <a href=\"index.html\" style=\"font-family:var(--font-heading);font-weight:600;font-size:19px;text-decoration:none;color:var(--color-text)\">&larr; Shrikant Naik<\u002Fa>\n      <span style=\"font-style:italic;color:var(--color-neutral-600)\">v1.0.0 &middot; 2026<\u002Fspan>\n      <\u002Fspan>\n    <\u002Fdiv>\n  <\u002Fheader>\n\n  <section data-screen-label=\"Project header\" style=\"padding:88px 0 0;max-width:820px\">\n    <p style=\"margin:0 0 18px;font-size:13px;font-weight:600;letter-spacing:0.16em;text-transform:uppercase;color:var(--color-accent-2-700)\">Side project<\u002Fp>\n    <h1 style=\"margin:0;font-family:var(--font-heading);font-weight:600;font-size:clamp(33px,7.5vw,52px);line-height:1.08;letter-spacing:-0.005em\">Brok&eacute;dex &mdash; Your Contacts, Catalogued<\u002Fh1>\n    <p style=\"margin:24px 0 0;font-size:20px;line-height:1.55;max-width:36em\">A Pok&eacute;dex-styled Android app for organising the people in your life &mdash; colour-coded by tag, searchable, with a call-log history built in.<\u002Fp>\n    <p style=\"margin:22px 0 0;font-size:16px;font-style:italic;color:var(--color-neutral-600)\">Solo build &middot; Kotlin, Jetpack Compose, Room &middot; Fully offline, zero network permissions &middot; v1.0.0<\u002Fp>\n  <\u002Fsection>\n\n  <section data-screen-label=\"What it is\" style=\"padding:100px 0 0;max-width:780px\">\n    <div aria-hidden=\"true\" style=\"display:flex;margin-bottom:16px\"><span style=\"width:15px;height:15px;background:var(--color-accent);mix-blend-mode:multiply\"><\u002Fspan><span style=\"width:15px;height:15px;background:var(--color-accent-2);mix-blend-mode:multiply;margin-left:-7px\"><\u002Fspan><span style=\"width:15px;height:15px;background:var(--color-process-yellow);mix-blend-mode:multiply;margin-left:-7px\"><\u002Fspan><\u002Fdiv>\n    <h2 style=\"margin:0 0 22px;font-family:var(--font-heading);font-weight:600;font-size:32px\">What it is<\u002Fh2>\n    <p style=\"margin:0;font-size:17.5px;line-height:1.65\">Brok&eacute;dex turns your contacts into Pok&eacute;dex entries: each person gets an entry number, a colour pulled from their type tag, a photo, and up to four &ldquo;moves&rdquo; &mdash; short, specific traits like a catchphrase or the thing they&rsquo;re known for. A dedicated log tracks every incoming, outgoing, and missed call against that contact, so &ldquo;who do I keep missing&rdquo; becomes a glance instead of a guess. Search, favourites, and tag filters keep the list usable past the first twenty entries. Everything lives in a local Room database &mdash; no account, no internet permission, nothing leaves the phone.<\u002Fp>\n  <\u002Fsection>\n\n  <section data-screen-label=\"Screens\" style=\"padding:100px 0 0;max-width:920px\">\n    <div aria-hidden=\"true\" style=\"display:flex;margin-bottom:16px\"><span style=\"width:15px;height:15px;background:var(--color-accent);mix-blend-mode:multiply\"><\u002Fspan><span style=\"width:15px;height:15px;background:var(--color-accent-2);mix-blend-mode:multiply;margin-left:-7px\"><\u002Fspan><span style=\"width:15px;height:15px;background:var(--color-process-yellow);mix-blend-mode:multiply;margin-left:-7px\"><\u002Fspan><\u002Fdiv>\n    <h2 style=\"margin:0 0 32px;font-family:var(--font-heading);font-weight:600;font-size:32px\">Screens<\u002Fh2>\n    <div class=\"m-shots\" style=\"display:flex;gap:32px;flex-wrap:wrap\">\n      <figure style=\"margin:0;flex:1 1 220px;max-width:260px\">\n        <span class=\"halftone\" style=\"display:block;border-radius:var(--radius-md);box-shadow:var(--shadow-md)\">\n          <img src=\"1d1dd437-0b73-4fa3-b126-d75a3147c7da\" alt=\"Brokédex list screen with search and colour-coded contact cards\" style=\"width:100%;display:block\">\n        <\u002Fspan>\n        <figcaption style=\"margin-top:10px;font-size:14px;color:var(--color-neutral-600)\">List &mdash; colour-coded by tag, favourites pinned with a heart<\u002Ffigcaption>\n      <\u002Ffigure>\n      <figure style=\"margin:0;flex:1 1 220px;max-width:260px\">\n        <span class=\"halftone\" style=\"display:block;border-radius:var(--radius-md);box-shadow:var(--shadow-md)\">\n          <img src=\"2a2cfc0a-b802-4fcc-81db-acdc9cbbaa45\" alt=\"Brokédex contact detail screen showing tags, stats, and signature moves\" style=\"width:100%;display:block\">\n        <\u002Fspan>\n        <figcaption style=\"margin-top:10px;font-size:14px;color:var(--color-neutral-600)\">Detail &mdash; tags, stats, and signature moves<\u002Ffigcaption>\n      <\u002Ffigure>\n      <figure style=\"margin:0;flex:1 1 220px;max-width:260px\">\n        <span class=\"halftone\" style=\"display:block;border-radius:var(--radius-md);box-shadow:var(--shadow-md)\">\n          <img src=\"ed613d94-e166-4595-b55a-88287b245ced\" alt=\"Brokédex call log screen for one contact showing incoming, outgoing, and missed calls\" style=\"width:100%;display:block\">\n        <\u002Fspan>\n        <figcaption style=\"margin-top:10px;font-size:14px;color:var(--color-neutral-600)\">Call log &mdash; every encounter with one contact, at a glance<\u002Ffigcaption>\n      <\u002Ffigure>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <section data-screen-label=\"How it was made\" style=\"padding:100px 0 0;max-width:780px\">\n    <div aria-hidden=\"true\" style=\"display:flex;margin-bottom:16px\"><span style=\"width:15px;height:15px;background:var(--color-accent);mix-blend-mode:multiply\"><\u002Fspan><span style=\"width:15px;height:15px;background:var(--color-accent-2);mix-blend-mode:multiply;margin-left:-7px\"><\u002Fspan><span style=\"width:15px;height:15px;background:var(--color-process-yellow);mix-blend-mode:multiply;margin-left:-7px\"><\u002Fspan><\u002Fdiv>\n    <h2 style=\"margin:0 0 22px;font-family:var(--font-heading);font-weight:600;font-size:32px\">How it was made<\u002Fh2>\n    <p style=\"margin:0;font-size:17.5px;line-height:1.65\">Built the way I&rsquo;d run a real product, not a hackathon weekend. A design PRD locked the visual language first &mdash; &ldquo;if the Pok&eacute;dex were redesigned by a modern fintech app&rdquo;: rounded cards and pastel tag colours against one monospaced accent, reserved only for entry numbers. That fed a full developer handoff &mdash; every screen, every field&rsquo;s validation rule, every empty state and edge case (what happens to an entry number when that contact is deleted, what the delete-confirmation copy says, the 300ms budget for search) specified precisely enough to hand to a developer without me in the room.<\u002Fp>\n    <p style=\"margin:20px 0 0;font-size:17.5px;line-height:1.65\">I was that developer: Kotlin and Jetpack Compose for the UI, Room for local persistence, built end-to-end with Claude Code and shipped as a self-signed release rather than routed through a store review cycle. A GTM plan and a roadmap doc came after the build, not before &mdash; the same sequencing discipline as the Yokogawa case, applied this time to something I owned outright, spec to release.<\u002Fp>\n  <\u002Fsection>\n\n  <section data-screen-label=\"Why it matters\" style=\"padding:100px 0 0;max-width:860px\">\n    <div aria-hidden=\"true\" style=\"display:flex;margin-bottom:16px\"><span style=\"width:15px;height:15px;background:var(--color-accent);mix-blend-mode:multiply\"><\u002Fspan><span style=\"width:15px;height:15px;background:var(--color-accent-2);mix-blend-mode:multiply;margin-left:-7px\"><\u002Fspan><span style=\"width:15px;height:15px;background:var(--color-process-yellow);mix-blend-mode:multiply;margin-left:-7px\"><\u002Fspan><\u002Fdiv>\n    <h2 style=\"margin:0 0 40px;font-family:var(--font-heading);font-weight:600;font-size:32px\">Why it&rsquo;s relevant, as a PMM<\u002Fh2>\n    <div class=\"m-grid2\" style=\"display:grid;grid-template-columns:1fr 1fr;gap:36px 64px\">\n      <div>\n        <p style=\"margin:0 0 8px;font-size:12.5px;font-weight:600;letter-spacing:0.14em;text-transform:uppercase;color:var(--color-neutral-500)\">Spec discipline<\u002Fp>\n        <p style=\"margin:0;font-size:16px;line-height:1.6\">Writing a developer handoff another builder could execute without me clarifying scope live is the same discipline as a PRD a cross-functional team can build against.<\u002Fp>\n      <\u002Fdiv>\n      <div>\n        <p style=\"margin:0 0 8px;font-size:12.5px;font-weight:600;letter-spacing:0.14em;text-transform:uppercase;color:var(--color-neutral-500)\">Full lifecycle, not just the deck<\u002Fp>\n        <p style=\"margin:0;font-size:16px;line-height:1.6\">PRD &rarr; design spec &rarr; build &rarr; GTM &rarr; roadmap. Most of my case studies stop at the strategy layer; this one shipped an installable product.<\u002Fp>\n      <\u002Fdiv>\n      <div>\n        <p style=\"margin:0 0 8px;font-size:12.5px;font-weight:600;letter-spacing:0.14em;text-transform:uppercase;color:var(--color-neutral-500)\">Positioning under constraint<\u002Fp>\n        <p style=\"margin:0;font-size:16px;line-height:1.6\">A nostalgia-utility hybrid with no obvious comp forced real audience thinking: who wants a Pokédex for their contacts, and why choose it over the contacts app already on their phone.<\u002Fp>\n      <\u002Fdiv>\n      <div>\n        <p style=\"margin:0 0 8px;font-size:12.5px;font-weight:600;letter-spacing:0.14em;text-transform:uppercase;color:var(--color-neutral-500)\">Trade-off calls<\u002Fp>\n        <p style=\"margin:0;font-size:16px;line-height:1.6\">The handoff doc&rsquo;s own &ldquo;out of scope for v1&rdquo; list &mdash; no cloud sync, no iOS, no social sharing &mdash; is a product call, not an engineering one. Same scoping muscle as the CareerLabs and Pineapple work.<\u002Fp>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <section data-screen-label=\"Get it\" style=\"padding:100px 0 0;max-width:780px\">\n    <div aria-hidden=\"true\" style=\"display:flex;margin-bottom:16px\"><span style=\"width:15px;height:15px;background:var(--color-accent);mix-blend-mode:multiply\"><\u002Fspan><span style=\"width:15px;height:15px;background:var(--color-accent-2);mix-blend-mode:multiply;margin-left:-7px\"><\u002Fspan><span style=\"width:15px;height:15px;background:var(--color-process-yellow);mix-blend-mode:multiply;margin-left:-7px\"><\u002Fspan><\u002Fdiv>\n    <h2 style=\"margin:0 0 22px;font-family:var(--font-heading);font-weight:600;font-size:32px\">Get it<\u002Fh2>\n    <p style=\"margin:0;font-size:17.5px;line-height:1.65\">Android, sideloaded (not on the Play Store) &mdash; the release page has the APK and full notes.<\u002Fp>\n    <div class=\"m-btnrow\" style=\"display:flex;gap:14px;margin-top:30px;flex-wrap:wrap\">\n      <a class=\"btn btn-primary\" href=\"https://github.com/shr1kant/brokedex-release/releases/tag/v1.0.0\" target=\"_blank\" rel=\"noopener\">Download v1.0.0 on GitHub<\u002Fa>\n    <\u002Fdiv>\n    <p style=\"margin:36px 0 0;font-size:17px\"><a href=\"index.html\">&larr; Back to portfolio<\u002Fa><\u002Fp>\n  <\u002Fsection>\n\n  <footer data-screen-label=\"Footer\" style=\"margin-top:120px;border-top:1px solid var(--color-text);border-bottom:3px solid var(--color-text)\">\n    <div style=\"display:flex;justify-content:space-between;align-items:baseline;gap:20px;flex-wrap:wrap;padding:14px 2px 16px;font-size:14.5px\">\n      <span><span style=\"font-weight:600\">Shrikant Naik<\u002Fspan> <span style=\"color:var(--color-neutral-600)\">&mdash; Product marketing &amp; GTM<\u002Fspan><\u002Fspan>\n      <span style=\"color:var(--color-neutral-700)\"><a href=\"mailto:shrikantnaik6@gmail.com\">shrikantnaik6@gmail.com<\u002Fa> &middot; Dubai<\u002Fspan>\n    <\u002Fdiv>\n  <\u002Ffooter>\n  <div style=\"height:56px\"><\u002Fdiv>\n\n<\u002Fdiv>\n<\u002Fx-dc>\n<\u002Fbody>\n<\u002Fhtml>"
