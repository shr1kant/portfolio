  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  const FONT_MIME = /^(font[/]|application[/](x-)?font-|application[/]vnd\.ms-fontobject)/i;
  const MIME_TOKEN = /^[\w.+-]+[/][\w.+-]+$/;
  function toBase64(bytes) {
    let bin = '';
    for (let i = 0; i < bytes.length; i += 0x8000) {
      bin += String.fromCharCode.apply(null, bytes.subarray(i, i + 0x8000));
    }
    return btoa(bin);
  }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    // Failed resource loads (CSP-blocked links, scripts, images) fire plain
    // events at the element — warn only; real JS errors carry message/error.
    if (!e.message && !e.error && e.target && e.target !== window) {
      console.warn('[bundle] resource failed to load:',
        e.target.tagName, String(e.target.src || e.target.href || ''));
      return;
    }
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    const resourceBlobs = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        if (FONT_MIME.test(entry.mime) && MIME_TOKEN.test(entry.mime)) {
          // Strict artifact hosts allow font-src data: but not blob:.
          blobUrls[uuid] = 'data:' + entry.mime + ';base64,' +
            (entry.compressed ? toBase64(finalBytes) : entry.data);
        } else {
          const blob = new Blob([finalBytes], { type: entry.mime });
          blobUrls[uuid] = URL.createObjectURL(blob);
          resourceBlobs[blobUrls[uuid]] = blob;
        }
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        const blob = new Blob([], { type: entry.mime });
        blobUrls[uuid] = URL.createObjectURL(blob);
        resourceBlobs[blobUrls[uuid]] = blob;
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    // Artifact-host CSP (connect-src 'self') refuses fetch() of blob: URLs —
    // consumers read these Blobs directly. Survives the swap like the error sink.
    window.__resourceBlobs = resourceBlobs;

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).replace(/<\//g, '<\\/') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: read and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const pre = resourceBlobs[s.src.split('#')[0]];
        s.textContent = pre ? await pre.text() : await (await fetch(s.src)).text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

  </script>

0100-02BA, U+02BD-02C5, U+02C7-02CC, U+02CE-02D7, U+02DD-02FF, U+0304, U+0308, U+0329, U+1D00-1DBF, U+1E00-1E9F, U+1EF2-1EFF, U+2020, U+20A0-20AB, U+20AD-20C0, U+2113, U+2C60-2C7F, U+A720-A7FF;\n}\n/* latin */\n@font-face {\n  font-family: 'Source Serif 4';\n  font-style: normal;\n  font-weight: 600;\n  font-display: swap;\n  src: url(\"c23484b5-e7ac-4b98-a344-18431c879c93\") format('woff2');\n  unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;\n}\n\n\n:root {\n  --color-bg: #f3f2f2;\n  --color-surface: #eae9e9;\n  --color-text: #201e1d;\n  --color-accent: #1e7a4a;\n  --color-accent-2: #6d7f7c;\n  --color-divider: color-mix(in srgb, #201e1d 16%, transparent);\n\n  /* Tonal ramps — generated in OKLCH on one shared lightness scale, so the\n     same step of any role matches the others in visual value. */\n  --color-neutral-100: #f8f4f4;\n  --color-neutral-200: #eae7e7;\n  --color-neutral-300: #d7d3d3;\n  --color-neutral-400: #bab6b6;\n  --color-neutral-500: #9b9797;\n  --color-neutral-600: #7d7979;\n  --color-neutral-700: #605d5d;\n  --color-neutral-800: #444141;\n  --color-neutral-900: #2d2b2b;\n\n  --color-accent-100: #eaf6ee;\n  --color-accent-200: #cfeeda;\n  --color-accent-300: #a3ddbb;\n  --color-accent-400: #6cc294;\n  --color-accent-500: #3ca26c;\n  --color-accent-600: #1a824f;\n  --color-accent-700: #0b6339;\n  --color-accent-800: #0a4629;\n  --color-accent-900: #0d2f1e;\n\n  --color-accent-2-100: #f0f4f3;\n  --color-accent-2-200: #dfe7e5;\n  --color-accent-2-300: #c4d0cd;\n  --color-accent-2-400: #a2b2ae;\n  --color-accent-2-500: #849591;\n  --color-accent-2-600: #667772;\n  --color-accent-2-700: #4e5d59;\n  --color-accent-2-800: #374440;\n  --color-accent-2-900: #252e2b;\n\n  /* The third process ink — review round 3: the deck's print treatments\n     (the CMYK separation and the misregistered plate numerals below) need\n     the full four-color set. Cyan and magenta are the system's own accents;\n     this yellow completes them, muted to the same press-ink register. A\n     print treatment color, not an interface accent — body copy and chrome\n     never take it. */\n  --color-process-yellow: #a9b7ae;\n\n  --font-heading: \"Source Serif 4\", system-ui, sans-serif;\n  --font-heading-weight: 600;\n  --font-body: \"Source Serif 4\", system-ui, sans-serif;\n\n  --space-1: 5.0px;\n  --space-2: 10.0px;\n  --space-3: 15.0px;\n  --space-4: 20.0px;\n  --space-6: 30.0px;\n  --space-8: 40.0px;\n\n  --radius-sm: 1px;\n  --radius-md: 2px;\n  --radius-lg: 4px;\n\n  /* Elevation — derived from the ground: soft ink-tinted shadows on a\n     light theme, a hairline edge + ambient darkness on a dark one. */\n  --shadow-sm: 0 1px 2px color-mix(in srgb, #2d2b2b 14%, transparent);\n  --shadow-md: 0 3px 10px color-mix(in srgb, #2d2b2b 16%, transparent);\n  --shadow-lg: 0 12px 32px color-mix(in srgb, #2d2b2b 22%, transparent);\n}\n\nbody {\n  background: var(--color-bg);\n  color: var(--color-text);\n  font-family: var(--font-body);\n}\nh1, h2, h3, h4 { font-family: var(--font-heading); font-weight: var(--font-heading-weight); }\n\n.halftone{position:relative;filter:grayscale(0.35) contrast(1.15);overflow:hidden}\n.halftone::after{content:\"\";position:absolute;inset:0;pointer-events:none;\n  background-image:radial-gradient(circle,rgba(0,0,0,0.22) 30%,transparent 32%);\n  background-size:3px 3px;mix-blend-mode:multiply}\n\n/* The four-color separation treatment (review round 3) — a photograph\n   printed as its misregistered process plates, after the Catalogue Three\n   grammar. Markup: a figure.cmyk holding five copies of the image — the\n   first is the layout sizer (hidden), then one per plate, each tagged\n   .sep-c/.sep-m/.sep-y/.sep-k. The plates are extracted live by the SVG\n   feColorMatrix filters in print-plates.js, the system's own defs —\n   inlined in the compiled bundle every template page loads, and a\n   page that links styles.css directly adds\n   <script src=\"print-plates.js\"><\u002Fscript> itself (the defs must be in\n   the document: a data-URI filter reference would not survive Chromium,\n   and external-file references are unreliable across engines) — nudged\n   a few pixels out of register, and multiplied\n   onto the paper ground; the halftone dot screens the recombined print.\n   The plate offsets live with the deck's projection-scale CSS, since\n   misregistration is sized to the output. */\n.cmyk{position:relative;overflow:hidden;background:var(--color-bg)}\n.cmyk img:first-child{opacity:0} /* layout sizer AND the alt-bearing image — opacity\n  keeps it in the accessibility tree (visibility:hidden would drop the figure's only\n  description); fully transparent, it adds nothing to the multiply backdrop */\n.cmyk img+img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;mix-blend-mode:multiply}\n.cmyk .sep-c{filter:url(#sep-c)}\n.cmyk .sep-m{filter:url(#sep-m)}\n.cmyk .sep-y{filter:url(#sep-y)}\n.cmyk .sep-k{filter:url(#sep-k)}\n.cmyk::after{content:\"\";position:absolute;inset:0;pointer-events:none;\n  background-image:radial-gradient(circle,rgba(0,0,0,0.22) 30%,transparent 32%);\n  background-size:3px 3px;mix-blend-mode:multiply}\n\n/* The one-image separation (review round 9, promoted from the deck in the\n   landing divergence) — the same four plates as ONE compound filter,\n   #sep-all in print-plates.js, for a single swappable image: a .print\n   wrapper inside the figure holds one <image-slot>, and the filter\n   extracts, offsets and multiplies the plates live from whatever the slot\n   shows. Markup: figure.cmyk > .print > image-slot (the page sizes the\n   .print — aspect-ratio, or absolute fill for bleeds). Hover resolves\n   the print into the photograph — the pressman checking registration on\n   the light table — so the source shows crisp and any swap chrome stays\n   legible; only the reduced-motion fallback below still lifts as a\n   single cut (a url() filter cannot CSS-transition; the press driver\n   animates the defs instead). */\n.cmyk .print{position:relative;width:100%;filter:url(#sep-all)}\n/* no hover end-state swap: the press driver (print-plates.js) eases the\n   plates into register while purifying their inks to the pure-process\n   separation on the same curve, so the converged four-plate merge IS\n   the photograph (their multiply equals SourceGraphic by construction)\n   — no cut anywhere on the animated path */\n@media (prefers-reduced-motion: reduce), (hover: none), (pointer: coarse) {\n  .cmyk .print:hover{filter:none} /* without the driver (it stands down on\n    exactly these conditions), hover stays the old single cut to the\n    crisp source */\n}\n.cmyk .print image-slot{width:100%;height:100%;display:block}\n\n/* The plate numeral (review rounds 3-4) — display figures set as\n   misregistered process plates, the catalog's cover grammar. Review\n   round 4 (Barron): THREE plates — C, M, Y only, no black plate — so the\n   dark core comes entirely from the C×M×Y multiply overlap (the inks\n   product to exact black), with the fringes the registration drift; and\n   the spread pulled in by half (less jumbled: one figure with plate\n   fringes rather than figures sliding apart). Markup: a .cmyk-num holding\n   a .paper span (the white of the sheet: the glyph's union, built from\n   offset text-shadow copies) and three .plate spans. The construction\n   carries its own ground (--cmyk-num-ground, defaulting to paper) painted\n   on its padding box, so the multiply plates always have their backdrop\n   even inside an isolated stacking context (entrance animations); the\n   padding bleeds wider than any plate offset and the negative margin\n   hands the layout box back. Offsets are em-scaled to the glyph. The\n   .paper span carries the text once for assistive tech; the .plate spans\n   are aria-hidden repeats. */\n.cmyk-num{--cmyk-num-ground:var(--color-bg);\n  position:relative;width:fit-content;line-height:0.9;\n  font-feature-settings:\"pnum\" 1;\n  background:var(--cmyk-num-ground);padding:0.12em;margin:-0.12em}\n.cmyk-num .paper{color:var(--color-bg); /* the white of the sheet — always paper,\n  whatever the ground: the plates read as printed on paper even when the\n  surrounding page is ink */\n  text-shadow:0.036em 0.025em 0 var(--color-bg),-0.031em -0.023em 0 var(--color-bg)}\n.cmyk-num .plate{position:absolute;inset:0.12em;mix-blend-mode:multiply;\n  text-box:trim-both cap alphabetic /* the host trims to its cap box; each\n  absolute plate must trim its own line the same way, or its glyphs sit a\n  half-leading below the paper union */}\n.cmyk-num .plate-c{color:var(--color-accent)}\n\n/* The plate headline (divergence round 3, Barron: \"use both\" — the\n   photograph's plates AND the cover grammar's text plates, on the same\n   page). The same three-plate construction as .cmyk-num — paper span\n   carrying the real text, C/M/Y plate repeats, dark core from the\n   multiply overlap — at HALF the numeral's round-4 offsets: the serif's\n   display hairlines are thinner than the numeral strokes the spread was\n   measured on, and the full offsets swallow them whole (probed at the\n   hero's 80px — the fringes read as an anaglyph poster, not a breath\n   out of register) — recut for display\n   headlines that sit in running text blocks on the page's own paper:\n   no ground painting and no padding bleed (the numeral's ground exists\n   for isolated stacking contexts; a headline on the page multiplies\n   straight onto the sheet), no width:fit-content and no line-height\n   override (the host display class owns its metrics — apply this to\n   each .line, which is position:relative for its plates), and the\n   plates are inert to the hand (pointer-events/user-select none, so a\n   triple-click selects the headline once, not four times). Plates take\n   the same pointer lean as .cmyk-num. */\n.cmyk-head{position:relative}\n.cmyk-head .paper{color:var(--color-bg);\n  text-shadow:0.027em 0.0185em 0 var(--color-bg),-0.0245em -0.0175em 0 var(--color-bg)\n  /* the union's copies sit at the construction's halved plate offsets\n     PLUS the full lean (0.018+0.009 / 0.0125+0.006, and mirrored), so\n     the union still backs the plates at viewport-edge lean — invisible\n     on the page's own paper, load-bearing on any other ground */}\n.cmyk-head .plate{position:absolute;inset:0;mix-blend-mode:multiply;\n  pointer-events:none;user-select:none;\n  text-box:trim-both cap alphabetic /* match the host's trim, or the\n  plates sit a half-leading below the paper union */}\n.cmyk-head .plate-c{color:var(--color-accent)}\n.cmyk-head .plate-m{color:var(--color-accent-2);\n  translate:calc(0.018em + 0.009em*var(--press-nx, 0)) calc(0.0125em + 0.006em*var(--press-ny, 0))}\n.cmyk-head .plate-y{color:var(--color-process-yellow);\n  translate:calc(-0.0155em + 0.009em*var(--press-nx, 0)) calc(-0.0115em + 0.006em*var(--press-ny, 0))}\n.cmyk-num .plate-m{color:var(--color-accent-2);\n  translate:calc(0.036em + 0.018em*var(--press-nx, 0)) calc(0.025em + 0.0125em*var(--press-ny, 0))}\n.cmyk-num .plate-y{color:var(--color-process-yellow);\n  translate:calc(-0.031em + 0.018em*var(--press-nx, 0)) calc(-0.023em + 0.0125em*var(--press-ny, 0))}\n/* --press-nx/--press-ny: the pointer lean as a bare -1..1 factor,\n   published on :root by the press driver (print-plates.js) and zero\n   whenever the driver stands down. Each construction scales the lean to\n   its own spread (half of it, here as everywhere) so the moving plates\n   drift a breath toward the cursor and the C plate holds. */\n\n/* ══════════════════════════════════════════════════════════════════════════\n   Components — built with the tokens above. Plain CSS\n   on plain HTML: no JavaScript, no build step. Each class is documented in\n   readme.md and demonstrated in foundations/ and components/.\n   ══════════════════════════════════════════════════════════════════════ */\n\n*, *::before, *::after { box-sizing: border-box; }\nbody { margin: 0; font-size: 15px; line-height: 1.55; font-weight: 400; }\nh1, h2, h3, h4, h5, h6 {\n  font-family: var(--font-heading); font-weight: var(--font-heading-weight);\n  line-height: 1.12; letter-spacing: -0.015em; margin: 0 0 var(--space-2);\n}\nh1 { font-size: 42px; }\nh2 { font-size: 32px; }\nh3 { font-size: 25px; }\nh4 { font-size: 20px; }\nh5 { font-size: 16px; }\nh6 { font-size: 13px; }\nh6 { letter-spacing: 0.08em; text-transform: uppercase; }\np { margin: 0 0 var(--space-3); }\na { color: var(--color-accent); text-underline-offset: 3px; }\nimg { display: block; max-width: 100%; }\nfigure { margin: 0; }\nfigcaption {\n  font-size: 11px; margin-top: var(--space-1);\n  color: color-mix(in srgb, var(--color-text) 55%, transparent);\n}\n.text-muted { color: color-mix(in srgb, var(--color-text) 55%, transparent); }\n:focus { outline: none; }\n:focus-visible { outline: 2px solid var(--color-accent); outline-offset: 2px; }\n::selection { background: color-mix(in srgb, var(--color-accent) 30%, transparent); }\n\n/* — rules — */\n.hr {\n  height: 1px; border: 0; margin: var(--space-4) 0;\n  background: var(--color-divider);\n}\n\n/* — buttons — */\n.btn {\n  display: inline-flex; align-items: center; justify-content: center; gap: 6px;\n  cursor: pointer; text-decoration: none;\n  font-family: var(--font-heading); font-weight: var(--font-heading-weight);\n  font-size: 14px; line-height: 1.2; color: var(--color-text); /* matches the .input's 14px —\n     the pair sits side by side in sign-up rows */\n  background: transparent; border: 1px solid transparent;\n  padding: var(--space-2) calc(var(--space-3) * 1.2);\n  border-radius: var(--radius-md);\n}\n.btn svg { display: block; }\n.btn:disabled { opacity: 0.45; cursor: not-allowed; }\n.btn-primary { background: var(--color-accent); color: var(--color-bg); }\n.btn-primary:hover { background: var(--color-accent-600); }\n.btn-primary:active { background: var(--color-accent-700); }\n.btn-secondary { border-color: var(--color-divider); }\n.btn-secondary:hover { background: color-mix(in srgb, var(--color-text) 7%, transparent); }\n.btn-secondary:active { background: color-mix(in srgb, var(--color-text) 14%, transparent); }\n.btn-ghost { color: var(--color-accent); padding-inline: var(--space-1); }\n.btn-ghost:hover { background: color-mix(in srgb, var(--color-accent) 10%, transparent); }\n.btn-ghost:active { background: color-mix(in srgb, var(--color-accent) 18%, transparent); }\n.btn-icon { width: 36px; height: 36px; padding: 0; }\n.btn-block { width: 100%; margin-top: var(--space-2); }\n\n/* — forms — */\n.field > label {\n  display: block; font-size: 12px; margin-bottom: 5px;\n  color: color-mix(in srgb, var(--color-text) 70%, transparent);\n}\n.input {\n  width: 100%; min-height: 36px; padding: 6px 10px; font: inherit;\n  font-size: 14px; color: var(--color-text); caret-color: var(--color-accent);\n  background: var(--color-surface);\n  border: 1px solid var(--color-divider); border-radius: var(--radius-md);\n}\n.input::placeholder { color: color-mix(in srgb, var(--color-text) 65%, transparent); opacity: 1; }\n  /* explicit, measured: the browser default gray misses the 4.5:1 small-text bar on\n     the surface fill; 65% ink measures 4.8:1 there, still a step quieter than typed\n     text (opacity:1 overrides Firefox's default placeholder fade) */\n.input:hover { border-color: color-mix(in srgb, var(--color-text) 45%, transparent); }\n.input:focus-visible { border-color: var(--color-accent); outline-offset: 0; }\ntextarea.input { min-height: 90px; resize: vertical; }\n.radio { display: inline-flex; align-items: center; gap: 8px; cursor: pointer; font-size: 14px; }\n.radio input, .seg-opt input {\n  position: absolute; opacity: 0; width: 0; height: 0; pointer-events: none;\n}\n.radio .dot {\n  width: 16px; height: 16px; flex: none; border-radius: 50%;\n  border: 1.5px solid var(--color-divider);\n}\n.radio:hover .dot { border-color: var(--color-accent); }\n.radio input:checked + .dot {\n  border-color: var(--color-accent); background: var(--color-accent);\n  box-shadow: inset 0 0 0 4px var(--color-bg);\n}\n.radio input:focus-visible + .dot { outline: 2px solid var(--color-accent); outline-offset: 2px; }\n.seg {\n  display: inline-flex; overflow: hidden;\n  border: 1px solid var(--color-divider); border-radius: var(--radius-md);\n}\n.seg-opt {\n  display: inline-flex; align-items: center; gap: 6px;\n  padding: 7px 12px; font-size: 13px; cursor: pointer;\n}\n.seg-opt + .seg-opt { border-left: 1px solid var(--color-divider); }\n.seg-opt:has(input:checked) { background: var(--color-accent); color: var(--color-bg); }\n.seg-opt:not(:has(input:checked)):hover { background: color-mix(in srgb, var(--color-text) 7%, transparent); }\n.seg-opt:has(input:focus-visible) { outline: 2px solid var(--color-accent); outline-offset: -2px; }\n\n/* — cards — */\n.card {\n  display: flex; flex-direction: column; gap: var(--space-2);\n  padding: var(--space-3); border-radius: var(--radius-md); background: var(--color-surface);\n}\n.card-kicker { font-size: 10px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--color-accent); }\n.card-title {\n  font-family: var(--font-heading); font-weight: var(--font-heading-weight);\n  font-size: 17px; line-height: 1.2;\n}\n.card-body { margin: 0; font-size: 13px; opacity: 0.8; flex: 1; }\n.card-meta {\n  display: flex; align-items: center; gap: 6px; font-size: 11px;\n  color: color-mix(in srgb, var(--color-text) 50%, transparent);\n}\n.elev-sm { box-shadow: var(--shadow-sm); }\n.elev-md { box-shadow: var(--shadow-md); }\n.elev-lg { box-shadow: var(--shadow-lg); }\n\n/* — tags — */\n.tag {\n  display: inline-flex; align-items: center; font-size: 11px;\n  letter-spacing: 0.02em; padding: 3px 10px;\n  border-radius: calc(var(--radius-md) * 0.75);\n}\n.tag-accent { background: var(--color-accent-100); color: var(--color-accent-800); }\n.tag-accent-2 { background: var(--color-accent-2-100); color: var(--color-accent-2-800); }\n.tag-neutral { background: var(--color-neutral-100); color: var(--color-neutral-800); }\n.tag-outline { border: 1px solid var(--color-accent); color: var(--color-accent); }\n\n/* — navigation — */\n.nav {\n  display: flex; align-items: center; gap: var(--space-4);\n  padding: var(--space-3) var(--space-4);\n  border-bottom: none;\n}\n.nav-brand {\n  font-family: var(--font-heading); font-weight: var(--font-heading-weight);\n  font-size: 18px; margin-right: auto;\n}\n.nav a { color: inherit; text-decoration: none; font-size: 14px; }\n.nav a:hover, .nav a[aria-current='page'] { color: var(--color-accent); }\n\n/* — tables — */\n.table { width: 100%; border-collapse: collapse; font-size: 14px; }\n.table th {\n  text-align: left; font-size: 11px; letter-spacing: 0.08em; text-transform: uppercase;\n  color: color-mix(in srgb, var(--color-text) 60%, transparent);\n  padding: var(--space-2); border-bottom: 1px solid var(--color-divider);\n}\n.table td {\n  padding: var(--space-2);\n  border-bottom: 1px solid color-mix(in srgb, var(--color-text) 8%, transparent);\n}\n.table tbody tr:hover { background: color-mix(in srgb, var(--color-text) 4%, transparent); }\n\n/* — dialog — */\n.dialog-backdrop {\n  position: fixed; inset: 0; display: grid; place-items: center;\n  padding: var(--space-4);\n  background: color-mix(in srgb, var(--color-neutral-900) 50%, transparent);\n}\n.dialog {\n  width: min(440px, 100%); display: flex; flex-direction: column; gap: var(--space-3);\n  padding: var(--space-4); border-radius: var(--radius-lg);\n  background: var(--color-surface); box-shadow: var(--shadow-lg);\n}\n.dialog-title {\n  font-family: var(--font-heading); font-weight: var(--font-heading-weight);\n  font-size: 20px;\n}\n.dialog-body { font-size: 14px; opacity: 0.85; }\n.dialog-actions { display: flex; justify-content: flex-end; gap: var(--space-2); margin-top: var(--space-2); }\n\n<\u002Fstyle>\n<script src=\"1fe9041a-2d99-49e2-8f5b-6c078c76dd4b\"><\u002Fscript>\n<style>\nbody{margin:0;background:var(--color-bg);color:var(--color-text);font-family:var(--font-body);-webkit-font-smoothing:antialiased;overflow-x:clip}\na{color:var(--color-accent-700);text-decoration-color:var(--color-accent-300);text-underline-offset:3px}\na:hover{color:var(--color-accent-600)}\nbutton:focus-visible,a:focus-visible{outline:2px solid var(--color-accent);outline-offset:2px}\nh1,h2,h3,p{text-wrap:pretty}\n@media (max-width:768px){\n  .m-wrap{padding-left:20px !important;padding-right:20px !important}\n  .m-hero{gap:32px !important;padding-top:52px !important}\n  .m-btnrow{width:100%}\n  .m-btnrow>.btn{flex:1 1 45%;text-align:center}\n  .m-band{padding:60px 22px !important}\n  .m-sec{padding-top:76px !important}\n  .m-grid2{grid-template-columns:1fr !important}\n  .m-bento{grid-template-columns:1fr !important;gap:36px 0 !important}\n  .m-bento-anchor{grid-column:auto !important;grid-row:auto !important}\n  .m-vp{margin-left:0 !important;margin-right:0 !important}\n  .m-arrow{display:none !important}\n  .m-dots{padding:10px 0 !important}\n}\n<\u002Fstyle>\n<\u002Fhelmet>\n<div class=\"m-wrap\" data-screen-label=\"Portfolio\" style=\"max-width:1060px;margin:0 auto;padding:28px 36px 0\">\n\n  <header>\n    <div style=\"display:flex;justify-content:space-between;align-items:center;gap:24px;padding:14px 2px;font-size:15px;flex-wrap:wrap\">\n      <span style=\"font-family:var(--font-heading);font-weight:600;font-size:19px\">Shrikant Naik<\u002Fspan>\n      <nav style=\"display:flex;align-items:center;gap:24px\">\n        <a href=\"case-studies.html\" style=\"text-decoration:none\">Case studies<\u002Fa>\n        <a href=\"#projects\" style=\"text-decoration:none\">Projects<\u002Fa>\n        <a href=\"#approach\" style=\"text-decoration:none\">Approach<\u002Fa>\n        <a href=\"https://www.linkedin.com/in/shrikantnaik-/\" target=\"_blank\" rel=\"noopener\" style=\"text-decoration:none\">LinkedIn<\u002Fa>\n      <\u002Fnav>\n      <span style=\"display:flex;align-items:center;gap:14px\">\n        <span aria-hidden=\"true\" style=\"display:flex\"><span style=\"width:11px;height:11px;background:var(--color-accent)\"><\u002Fspan><span style=\"width:11px;height:11px;background:var(--color-accent-300)\"><\u002Fspan><span style=\"width:11px;height:11px;background:var(--color-accent-2)\"><\u002Fspan><span style=\"width:11px;height:11px;background:var(--color-accent-2-300)\"><\u002Fspan><span style=\"width:11px;height:11px;background:var(--color-process-yellow)\"><\u002Fspan><span style=\"width:11px;height:11px;background:var(--color-neutral-500)\"><\u002Fspan><span style=\"width:11px;height:11px;background:var(--color-text)\"><\u002Fspan><\u002Fspan>\n      <\u002Fspan>\n    <\u002Fdiv>\n  <\u002Fheader>\n\n  <section class=\"m-hero\" data-screen-label=\"Hero\" style=\"padding:84px 0 24px;display:flex;gap:72px;align-items:center;flex-wrap:wrap\">\n    <div style=\"flex:1 1 420px;min-width:320px\">\n    <h1 class=\"cmyk-head\" style=\"margin:0;font-family:var(--font-heading);font-weight:600;font-size:clamp(40px,10vw,74px);line-height:1.04;letter-spacing:-0.01em\">\n      <span class=\"paper\">Shrikant Naik<\u002Fspan>\n      <span class=\"plate plate-c\" aria-hidden=\"true\">Shrikant Naik<\u002Fspan>\n      <span class=\"plate plate-m\" aria-hidden=\"true\">Shrikant Naik<\u002Fspan>\n      <span class=\"plate plate-y\" aria-hidden=\"true\">Shrikant Naik<\u002Fspan>\n    <\u002Fh1>\n    <p style=\"margin:34px 0 0;font-size:clamp(21px,4.6vw,27px);line-height:1.35;max-width:24em\">Product marketing and GTM strategy, backed by four years of operations and project delivery.<\u002Fp>\n    <p style=\"margin:16px 0 0;font-size:18px;line-height:1.55;color:var(--color-neutral-700);max-width:36em\">Currently proving it through hands-on GTM work — starting with Yokogawa’s ERP market entry.<\u002Fp>\n    <p style=\"margin:22px 0 0;font-size:16px;font-style:italic;color:var(--color-neutral-600)\">Dubai · Global MBA, SP Jain School of Global Management · Available Sep 2026<\u002Fp>\n    <div class=\"m-btnrow\" style=\"display:flex;gap:14px;margin-top:38px;flex-wrap:wrap\">\n      <a class=\"btn btn-primary\" href=\"yokogawa.html\">View the Yokogawa case<\u002Fa>\n      <a class=\"btn btn-secondary\" href=\"https://www.linkedin.com/in/shrikantnaik-/\" target=\"_blank\" rel=\"noopener\">LinkedIn<\u002Fa>\n    <\u002Fdiv>\n    <\u002Fdiv>\n    <figure style=\"margin:0;flex:1 1 280px;min-width:240px;max-width:340px\">\n      <img src=\"75af325c-6942-4653-a11e-8adac54d5e57\" alt=\"Portrait of Shrikant Naik\" style=\"width:100%;display:block;border-radius:var(--radius-md);box-shadow:var(--shadow-md)\">\n    <\u002Ffigure>\n  <\u002Fsection>\n\n  <section class=\"m-band\" data-screen-label=\"Proof bento\" style=\"margin:110px calc(50% - 50vw) 0;padding:84px 36px;background:var(--color-accent-100)\">\n    <div style=\"max-width:988px;margin:0 auto\">\n    <p style=\"margin:0 0 40px;font-size:13px;font-weight:600;letter-spacing:0.16em;text-transform:uppercase;color:var(--color-neutral-600)\">Proof<\u002Fp>\n    <div class=\"m-bento\" style=\"display:grid;grid-template-columns:1.4fr 1fr;gap:40px 64px;max-width:940px\">\n\n      <div class=\"m-bento-anchor\" style=\"grid-column:1;grid-row:1 / span 3;cursor:default\" sc-camel-on-mouse-enter=\"{{ t0.enter }}\" sc-camel-on-mouse-leave=\"{{ t0.leave }}\" sc-camel-on-click=\"{{ t0.toggle }}\">\n        <div class=\"cmyk-num\" style=\"font-family:var(--font-heading);font-weight:600;font-size:clamp(64px,15vw,116px);line-height:0.95;--cmyk-num-ground:var(--color-accent-100)\">\n          <span class=\"paper\">+64%<\u002Fspan>\n          <span class=\"plate plate-c\" aria-hidden=\"true\">+64%<\u002Fspan>\n          <span class=\"plate plate-m\" aria-hidden=\"true\">+64%<\u002Fspan>\n          <span class=\"plate plate-y\" aria-hidden=\"true\">+64%<\u002Fspan>\n        <\u002Fdiv>\n        <div style=\"margin-top:16px;font-size:16px;color:var(--color-neutral-600)\">program completion lift<\u002Fdiv>\n        <div style=\"margin-top:10px;max-width:30em;font-size:16px;line-height:1.55;color:var(--color-neutral-800)\">\n          <div style=\"{{ t0.ctxStyle }}\">Customer research surfaced 6 drop-off points, fixed with automated milestone comms. <em>CareerLabs<\u002Fem><\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <div style=\"cursor:default\" sc-camel-on-mouse-enter=\"{{ t1.enter }}\" sc-camel-on-mouse-leave=\"{{ t1.leave }}\" sc-camel-on-click=\"{{ t1.toggle }}\">\n        <div style=\"font-family:var(--font-heading);font-weight:600;font-size:clamp(40px,9vw,54px);line-height:1;color:var(--color-accent-700)\">80% on-time<\u002Fdiv>\n        <div style=\"margin-top:8px;font-size:15px;color:var(--color-neutral-600)\">project delivery<\u002Fdiv>\n        <div style=\"margin-top:10px;max-width:30em;font-size:15px;line-height:1.5;color:var(--color-neutral-800)\">\n          <div style=\"{{ t1.ctxStyle }}\">Across 35+ projects managed solo, with 100% client retention. <em>Pineapple Design<\u002Fem><\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <div style=\"cursor:default\" sc-camel-on-mouse-enter=\"{{ t2.enter }}\" sc-camel-on-mouse-leave=\"{{ t2.leave }}\" sc-camel-on-click=\"{{ t2.toggle }}\">\n        <div style=\"font-family:var(--font-heading);font-weight:600;font-size:clamp(40px,9vw,54px);line-height:1;color:var(--color-accent-700)\">₹3L+<\u002Fdiv>\n        <div style=\"margin-top:8px;font-size:15px;color:var(--color-neutral-600)\">net-new retainer<\u002Fdiv>\n        <div style=\"margin-top:10px;max-width:30em;font-size:15px;line-height:1.5;color:var(--color-neutral-800)\">\n          <div style=\"{{ t2.ctxStyle }}\">Created mid-project at 100% margin. <em>Pineapple Design<\u002Fem><\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <div style=\"cursor:default\" sc-camel-on-mouse-enter=\"{{ t3.enter }}\" sc-camel-on-mouse-leave=\"{{ t3.leave }}\" sc-camel-on-click=\"{{ t3.toggle }}\">\n        <div style=\"font-family:var(--font-heading);font-weight:600;font-size:clamp(40px,9vw,54px);line-height:1;color:var(--color-accent-700)\">10+ hrs/wk<\u002Fdiv>\n        <div style=\"margin-top:8px;font-size:15px;color:var(--color-neutral-600)\">manual work eliminated<\u002Fdiv>\n        <div style=\"margin-top:10px;max-width:30em;font-size:15px;line-height:1.5;color:var(--color-neutral-800)\">\n          <div style=\"{{ t3.ctxStyle }}\">By integrating 8+ AI tools into client workflows. <em>Pineapple Design<\u002Fem><\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n    <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <section class=\"m-sec\" data-screen-label=\"Featured case\" style=\"padding:120px 0 0;max-width:920px\">\n    <p style=\"margin:0 0 18px;font-size:13px;font-weight:600;letter-spacing:0.16em;text-transform:uppercase;color:var(--color-accent-2-700)\">Featured case study<\u002Fp>\n    <h2 style=\"margin:0;font-family:var(--font-heading);font-weight:600;font-size:clamp(30px,6vw,42px);line-height:1.12;max-width:20em\">Yokogawa ERP — Market Entry Strategy for ANZ<\u002Fh2>\n    <p style=\"margin:20px 0 0;font-size:19px;line-height:1.55;max-width:38em\">A go-to-market strategy for Yokogawa Electric’s Microsoft Dynamics 365 ERP business, entering the Food &amp; Beverage and Pharmaceutical sectors across Australia and New Zealand.<\u002Fp>\n    <div class=\"m-grid2\" style=\"display:grid;grid-template-columns:1fr 1fr;gap:36px 64px;margin-top:44px\">\n      <div>\n        <p style=\"margin:0 0 8px;font-size:12.5px;font-weight:600;letter-spacing:0.14em;text-transform:uppercase;color:var(--color-neutral-500)\">The problem<\u002Fp>\n        <p style=\"margin:0;font-size:16px;line-height:1.6\">Yokogawa held a rare structural advantage, owning both plant-floor operational technology and ERP capability, but had no market intelligence, business case, or go-to-market plan to act on it.<\u002Fp>\n      <\u002Fdiv>\n      <div>\n        <p style=\"margin:0 0 8px;font-size:12.5px;font-weight:600;letter-spacing:0.14em;text-transform:uppercase;color:var(--color-neutral-500)\">The work<\u002Fp>\n        <p style=\"margin:0;font-size:16px;line-height:1.6\">Market sizing (TAM/SAM/SOM), competitive benchmarking, a modified adoption framework, three-scenario financial modeling, and an integrated GTM playbook.<\u002Fp>\n      <\u002Fdiv>\n      <div>\n        <p style=\"margin:0 0 8px;font-size:12.5px;font-weight:600;letter-spacing:0.14em;text-transform:uppercase;color:var(--color-neutral-500)\">The outcome<\u002Fp>\n        <p style=\"margin:0;font-size:16px;line-height:1.6\">A base-case revenue model of ~USD 3.34M over 36 months, a CDMO-first entry sequence, and positioning built on integration ownership rather than feature depth.<\u002Fp>\n      <\u002Fdiv>\n      <div>\n        <p style=\"margin:0 0 8px;font-size:12.5px;font-weight:600;letter-spacing:0.14em;text-transform:uppercase;color:var(--color-neutral-500)\">My role<\u002Fp>\n        <p style=\"margin:0;font-size:16px;line-height:1.6\">Project lead across a four-person team — owned the secondary research base, coordinated the four workstreams from market intelligence through to the final playbook, and ran project management and delivery cadence.<\u002Fp>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <p style=\"margin:40px 0 0;font-size:17px\"><a href=\"yokogawa.html\">Read the full case study →<\u002Fa><\u002Fp>\n  <\u002Fsection>\n\n  <section class=\"m-sec\" data-screen-label=\"Case carousel\" style=\"padding:120px 0 0;max-width:920px\">\n    <div style=\"display:flex;justify-content:space-between;align-items:flex-end;gap:24px;flex-wrap:wrap;margin-bottom:34px\">\n      <div>\n        <p style=\"margin:0 0 6px;font-size:13px;font-weight:600;letter-spacing:0.16em;text-transform:uppercase;color:var(--color-neutral-600)\">More work<\u002Fp>\n        <p style=\"margin:0;font-size:16px;color:var(--color-neutral-700)\">Two more cases — use the arrows to move between them. <a href=\"case-studies.html\">See all cases in full →<\u002Fa><\u002Fp>\n      <\u002Fdiv>\n      <span style=\"font-family:var(--font-heading);font-size:16px;color:var(--color-neutral-700);font-variant-numeric:tabular-nums\">{{ counterText }}<\u002Fspan>\n    <\u002Fdiv>\n\n    <div style=\"position:relative\">\n      <button type=\"button\" class=\"btn btn-icon m-arrow\" aria-label=\"Previous case\" sc-camel-on-click=\"{{ prev }}\" style=\"{{ prevArrowStyle }}\">←<\u002Fbutton>\n\n      <div class=\"m-vp\" style=\"overflow:clip;touch-action:pan-y;margin:0 128px\" sc-camel-on-touch-start=\"{{ onTouchStart }}\" sc-camel-on-touch-end=\"{{ onTouchEnd }}\">\n        <div style=\"{{ trackStyle }}\">\n\n          <div style=\"flex:0 0 100%;box-sizing:border-box;padding:0 2px\">\n            <p style=\"margin:0 0 16px;font-size:12.5px;font-weight:600;letter-spacing:0.15em;text-transform:uppercase;color:var(--color-neutral-500)\">Second case · Positioning framework<\u002Fp>\n            <h2 style=\"margin:0;font-family:var(--font-heading);font-weight:600;font-size:clamp(28px,6vw,36px);line-height:1.14;max-width:20em\">Building Trust for Clinical AI Adoption — Singapore<\u002Fh2>\n            <p style=\"margin:18px 0 0;font-size:18px;line-height:1.55;max-width:38em\">A B2B2C positioning framework for a diagnostic-AI product, addressing why clinical accuracy alone fails to convert patients into users.<\u002Fp>\n            <div class=\"m-grid2\" style=\"display:grid;grid-template-columns:1fr 1fr;gap:32px 64px;margin-top:38px\">\n              <div>\n                <p style=\"margin:0 0 8px;font-size:12.5px;font-weight:600;letter-spacing:0.14em;text-transform:uppercase;color:var(--color-neutral-500)\">The insight<\u002Fp>\n                <p style=\"margin:0;font-size:15.5px;line-height:1.6\">A privacy paradox: patients fear data misuse more than diagnostic error. In a survey of 80 Singaporean healthcare users, privacy concern was the strongest adoption barrier (r = −0.58), and 77.5% said they’d adopt AI if a doctor recommended it — versus 15% without.<\u002Fp>\n              <\u002Fdiv>\n              <div>\n                <p style=\"margin:0 0 8px;font-size:12.5px;font-weight:600;letter-spacing:0.14em;text-transform:uppercase;color:var(--color-neutral-500)\">The reframe<\u002Fp>\n                <p style=\"margin:0;font-size:15.5px;line-height:1.6\">Move positioning from “95% accurate” to “secure, doctor-recommended,” sequencing institutional (B2B) trust before consumer (B2C) demand — validated against a market case where accuracy-led marketing produced a sub-2% conversion rate.<\u002Fp>\n              <\u002Fdiv>\n              <div style=\"grid-column:1 / -1\">\n                <p style=\"margin:0 0 8px;font-size:12.5px;font-weight:600;letter-spacing:0.14em;text-transform:uppercase;color:var(--color-neutral-500)\">My role<\u002Fp>\n                <p style=\"margin:0;font-size:15.5px;line-height:1.6;max-width:44em\">Sole author. Ran the full project end-to-end: designed and fielded the n=80 survey, analyzed the data, and built the positioning framework and go-to-market recommendation.<\u002Fp>\n              <\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n\n          <div style=\"flex:0 0 100%;box-sizing:border-box;padding:0 2px\">\n            <p style=\"margin:0 0 16px;font-size:12.5px;font-weight:600;letter-spacing:0.15em;text-transform:uppercase;color:var(--color-accent-700)\">Third case · Startup GTM<\u002Fp>\n            <h2 style=\"margin:0;font-family:var(--font-heading);font-weight:600;font-size:clamp(28px,6vw,34px);line-height:1.16;max-width:22em\">Kintsugi — Dubai’s Managed Capability Market<\u002Fh2>\n            <p style=\"margin:18px 0 6px;font-size:17px;line-height:1.5;max-width:40em;color:var(--color-neutral-700)\">A five-person startup GTM concept, expanded below.<\u002Fp>\n\n            <div style=\"margin-top:22px;border-bottom:1px solid var(--color-neutral-300)\">\n\n              <div style=\"border-top:1px solid var(--color-neutral-300)\">\n                <button type=\"button\" sc-camel-on-click=\"{{ a0.toggle }}\" aria-expanded=\"{{ a0.open }}\" style=\"{{ a0.headStyle }}\">\n                  <span><span style=\"font-weight:600;font-family:var(--font-heading);font-size:19px\">The pitch<\u002Fspan> <span style=\"color:var(--color-neutral-600);font-size:15px\">— the concept<\u002Fspan><\u002Fspan>\n                  <span style=\"{{ a0.signStyle }}\">+<\u002Fspan>\n                <\u002Fbutton>\n                <div style=\"{{ a0.bodyStyle }}\"><div style=\"padding:0 0 22px\">\n                  <p style=\"margin:0;font-size:16px;line-height:1.62;max-width:46em\">An industry project built as a startup GTM plan, designing a multi-sided matching service that connects large UAE corporates’ unmet capability gaps with two supply pools no single operator aggregates — live SMEs and dormant, licensed startup assets sitting idle since the 2022–2026 MENA funding correction.<\u002Fp>\n                <\u002Fdiv><\u002Fdiv>\n              <\u002Fdiv>\n\n              <div style=\"border-top:1px solid var(--color-neutral-300)\">\n                <button type=\"button\" sc-camel-on-click=\"{{ a1.toggle }}\" aria-expanded=\"{{ a1.open }}\" style=\"{{ a1.headStyle }}\">\n                  <span><span style=\"font-weight:600;font-family:var(--font-heading);font-size:19px\">Problem &amp; opportunity<\u002Fspan> <span style=\"color:var(--color-neutral-600);font-size:15px\">— gaps in the current market<\u002Fspan><\u002Fspan>\n                  <span style=\"{{ a1.signStyle }}\">+<\u002Fspan>\n                <\u002Fbutton>\n                <div style=\"{{ a1.bodyStyle }}\"><div style=\"padding:0 0 22px\">\n                  <p style=\"margin:0;font-size:16px;line-height:1.62;max-width:46em\">UAE corporates run 12–18 month procurement cycles while capability gaps widen; hundreds of dormant startups hold decaying licenses, IP, and teams with no structured recovery market (insolvency firms liquidate near 10% of value; M&amp;A advisors won’t touch deals under AED 20M). No incumbent — accelerators, procurement portals, or M&amp;A advisors — runs the full diagnose-to-transfer chain end to end.<\u002Fp>\n                <\u002Fdiv><\u002Fdiv>\n              <\u002Fdiv>\n\n              <div style=\"border-top:1px solid var(--color-neutral-300)\">\n                <button type=\"button\" sc-camel-on-click=\"{{ a2.toggle }}\" aria-expanded=\"{{ a2.open }}\" style=\"{{ a2.headStyle }}\">\n                  <span><span style=\"font-weight:600;font-family:var(--font-heading);font-size:19px\">Strategy &amp; validation<\u002Fspan> <span style=\"color:var(--color-neutral-600);font-size:15px\">— testing the assumptions<\u002Fspan><\u002Fspan>\n                  <span style=\"{{ a2.signStyle }}\">+<\u002Fspan>\n                <\u002Fbutton>\n                <div style=\"{{ a2.bodyStyle }}\"><div style=\"padding:0 0 22px\">\n                  <p style=\"margin:0;font-size:16px;line-height:1.62;max-width:46em\">Modeled a five-engine revenue architecture — two recurring streams (SME subscriptions, AED 8K–20K/yr; corporate platform fees, AED 25K–150K/yr) and three transactional streams (dormant-asset access, match, and success fees) — targeting a 90-day brief-to-solution cycle against the market’s 12–18 month standard. Year 1 model: AED 1,202,500 projected revenue against AED 1,617,500 in costs (a AED 415,000 net loss), with recurring revenue covering 63% of costs before any deals close, against an AED 1.5M raise.<\u002Fp>\n                <\u002Fdiv><\u002Fdiv>\n              <\u002Fdiv>\n\n              <div style=\"border-top:1px solid var(--color-neutral-300)\">\n                <button type=\"button\" sc-camel-on-click=\"{{ a3.toggle }}\" aria-expanded=\"{{ a3.open }}\" style=\"{{ a3.headStyle }}\">\n                  <span><span style=\"font-weight:600;font-family:var(--font-heading);font-size:19px\">Outcome &amp; my role<\u002Fspan> <span style=\"color:var(--color-neutral-600);font-size:15px\">— strategic deliverables<\u002Fspan><\u002Fspan>\n                  <span style=\"{{ a3.signStyle }}\">+<\u002Fspan>\n                <\u002Fbutton>\n                <div style=\"{{ a3.bodyStyle }}\"><div class=\"m-grid2\" style=\"padding:0 0 22px;display:grid;grid-template-columns:1fr 1fr;gap:28px 56px\">\n                  <div>\n                    <p style=\"margin:0 0 8px;font-size:12.5px;font-weight:600;letter-spacing:0.14em;text-transform:uppercase;color:var(--color-neutral-500)\">The execution<\u002Fp>\n                    <p style=\"margin:0;font-size:15.5px;line-height:1.6\">A sector-specific launch plan (Logistics &amp; PropTech, chosen for corporate urgency and dormant-asset density), pricing architecture, and breakeven model.<\u002Fp>\n                  <\u002Fdiv>\n                  <div>\n                    <p style=\"margin:0 0 8px;font-size:12.5px;font-weight:600;letter-spacing:0.14em;text-transform:uppercase;color:var(--color-neutral-500)\">My contribution<\u002Fp>\n                    <p style=\"margin:0;font-size:15.5px;line-height:1.6\">Equal contribution across a five-person founding team (Maral Erzorig, Vedant Moktali, Parth Purohit, Nivedhitha Balachandran, and myself). My focus areas were ideation, GTM deck narrative, and the breakeven/unit-economics modeling.<\u002Fp>\n                  <\u002Fdiv>\n                <\u002Fdiv><\u002Fdiv>\n              <\u002Fdiv>\n\n            <\u002Fdiv>\n          <\u002Fdiv>\n\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <button type=\"button\" class=\"btn btn-icon m-arrow\" aria-label=\"Next case\" sc-camel-on-click=\"{{ next }}\" style=\"{{ nextArrowStyle }}\">→<\u002Fbutton>\n    <\u002Fdiv>\n\n    <div class=\"m-dots\" style=\"display:flex;gap:10px;margin-top:34px\" role=\"tablist\" aria-label=\"Case slides\">\n      <sc-for list=\"{{ dots }}\" as=\"dot\" hint-placeholder-count=\"2\">\n        <button type=\"button\" role=\"tab\" aria-label=\"{{ dot.label }}\" aria-selected=\"{{ dot.selected }}\" sc-camel-on-click=\"{{ dot.go }}\" style=\"{{ dot.style }}\"><\u002Fbutton>\n      <\u002Fsc-for>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n\n  <section id=\"projects\" class=\"m-sec\" data-screen-label=\"Projects\" style=\"padding:120px 0 0;max-width:920px\">\n    <p style=\"margin:0 0 18px;font-size:13px;font-weight:600;letter-spacing:0.16em;text-transform:uppercase;color:var(--color-accent-2-700)\">Side project<\u002Fp>\n    <h2 style=\"margin:0;font-family:var(--font-heading);font-weight:600;font-size:clamp(30px,6vw,42px);line-height:1.12;max-width:20em\">Brok&eacute;dex &mdash; a Pok&eacute;dex for your contacts<\u002Fh2>\n    <p style=\"margin:20px 0 0;font-size:19px;line-height:1.55;max-width:38em\">A Pok&eacute;dex-styled Android app for cataloguing the people in your life &mdash; entry numbers, colour-coded type tags, favourites, and a call-log history &mdash; built local-first with Room and zero network permissions. I wrote the PRD, the design spec, and the developer handoff, then built and shipped it myself in Kotlin and Jetpack Compose.<\u002Fp>\n    <div class=\"m-btnrow\" style=\"display:flex;gap:14px;margin-top:36px;flex-wrap:wrap\">\n      <a class=\"btn btn-primary\" href=\"brokedex.html\">Read the full breakdown<\u002Fa>\n      <a class=\"btn btn-secondary\" href=\"https://github.com/shr1kant/brokedex-release/releases/tag/v1.0.0\" target=\"_blank\" rel=\"noopener\">Download on GitHub<\u002Fa>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <section id=\"approach\" class=\"m-band\" data-screen-label=\"Alignment &amp; placement\" style=\"margin:120px calc(50% - 50vw) 0;padding:84px 36px;background:var(--color-accent-2-100)\">\n    <div style=\"max-width:988px;margin:0 auto\"><div style=\"max-width:860px\">\n    <div aria-hidden=\"true\" style=\"display:flex;margin-bottom:16px\"><span style=\"width:15px;height:15px;background:var(--color-accent);mix-blend-mode:multiply\"><\u002Fspan><span style=\"width:15px;height:15px;background:var(--color-accent-2);mix-blend-mode:multiply;margin-left:-7px\"><\u002Fspan><span style=\"width:15px;height:15px;background:var(--color-process-yellow);mix-blend-mode:multiply;margin-left:-7px\"><\u002Fspan><\u002Fdiv>\n    <h2 style=\"margin:0 0 40px;font-family:var(--font-heading);font-weight:600;font-size:34px;line-height:1.14;max-width:16em\">What you get, and what I’m looking for.<\u002Fh2>\n    <div class=\"m-grid2\" style=\"display:grid;grid-template-columns:1fr 1fr;gap:40px 72px\">\n      <div>\n        <p style=\"margin:0 0 10px;font-size:12.5px;font-weight:600;letter-spacing:0.14em;text-transform:uppercase;color:var(--color-neutral-600)\">What you get<\u002Fp>\n        <p style=\"margin:0;font-size:18px;line-height:1.62;max-width:32em\">A background across operations, customer research, and GTM strategy: financial modeling for a market entry, primary research for a positioning problem, workflow automation that removed manual hours. The throughline is turning ambiguous problems into a decision with a plan attached.<\u002Fp>\n      <\u002Fdiv>\n      <div>\n        <p style=\"margin:0 0 10px;font-size:12.5px;font-weight:600;letter-spacing:0.14em;text-transform:uppercase;color:var(--color-neutral-600)\">What I’m looking for<\u002Fp>\n        <p style=\"margin:0;font-size:18px;line-height:1.62;max-width:32em\">PMM or GTM roles at early-to-mid stage startups: fast-moving, ownership clear, execution-focused. Available for full-time roles starting September 2026.<\u002Fp>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <\u002Fdiv><\u002Fdiv>\n  <\u002Fsection>\n\n  <section class=\"m-sec\" data-screen-label=\"Two beliefs\" style=\"padding:120px 0 0;max-width:900px\">\n    <p style=\"margin:0 0 18px;font-size:13px;font-weight:600;letter-spacing:0.16em;text-transform:uppercase;color:var(--color-neutral-600)\">Philosophy<\u002Fp>\n    <h2 style=\"margin:0 0 48px;font-family:var(--font-heading);font-weight:600;font-size:34px\">Two beliefs.<\u002Fh2>\n    <div style=\"display:flex;flex-direction:column;gap:44px\">\n      <div>\n        <h3 style=\"margin:0 0 12px;font-family:var(--font-heading);font-weight:600;font-size:25px;line-height:1.2;max-width:20em\">Process is vapor without a single source of truth.<\u002Fh3>\n        <p style=\"margin:0;font-size:17px;line-height:1.62;max-width:44em\">The failure mode isn’t weak PM software, it’s ambiguity about who owns what by when. If a stakeholder has to ask where a deliverable stands, the communication loop already broke.<\u002Fp>\n      <\u002Fdiv>\n      <div>\n        <h3 style=\"margin:0 0 12px;font-family:var(--font-heading);font-weight:600;font-size:25px;line-height:1.2;max-width:22em\">If you can’t explain the value in the buyer’s vocabulary, the features don’t matter.<\u002Fh3>\n        <p style=\"margin:0;font-size:17px;line-height:1.62;max-width:44em\">Technical superiority doesn’t win markets — translating capability into what the buyer actually feels does. The mistake is marketing the how instead of why it matters to them.<\u002Fp>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <section class=\"m-sec\" data-screen-label=\"Experience\" style=\"padding:120px 0 0;max-width:860px\">\n    <div aria-hidden=\"true\" style=\"display:flex;margin-bottom:16px\"><span style=\"width:15px;height:15px;background:var(--color-accent);mix-blend-mode:multiply\"><\u002Fspan><span style=\"width:15px;height:15px;background:var(--color-accent-2);mix-blend-mode:multiply;margin-left:-7px\"><\u002Fspan><span style=\"width:15px;height:15px;background:var(--color-process-yellow);mix-blend-mode:multiply;margin-left:-7px\"><\u002Fspan><\u002Fdiv>\n    <h2 style=\"margin:0 0 48px;font-family:var(--font-heading);font-weight:600;font-size:34px\">Experience<\u002Fh2>\n\n    <div style=\"display:flex;flex-direction:column;gap:52px\">\n      <article>\n        <div style=\"display:flex;justify-content:space-between;align-items:baseline;gap:20px;flex-wrap:wrap\">\n          <h3 style=\"margin:0;font-family:var(--font-heading);font-weight:600;font-size:23px\">Pineapple Design <span style=\"font-weight:400;color:var(--color-neutral-600)\">— Senior Associate PM, Founder’s Office<\u002Fspan><\u002Fh3>\n          <span style=\"font-size:15px;color:var(--color-neutral-600)\">2024–25<\u002Fspan>\n        <\u002Fdiv>\n        <p style=\"margin:12px 0 0;font-size:16.5px;line-height:1.6;max-width:42em\">Ran 35+ projects solo at 80% on-time and 100% retention. Created a net-new ₹3L+ retainer mid-project. Built an AI-powered brand chatbot adopted across all projects.<\u002Fp>\n        <sc-if value=\"{{ showDem }}\" hint-placeholder-val=\"{{ true }}\">\n          <p style=\"margin:10px 0 0;font-size:15px;font-style:italic;color:var(--color-accent-700)\">Demonstrates: end-to-end delivery, commercial instinct, AI-enabled workflow design.<\u002Fp>\n        <\u002Fsc-if>\n      <\u002Farticle>\n\n      <article>\n        <div style=\"display:flex;justify-content:space-between;align-items:baseline;gap:20px;flex-wrap:wrap\">\n          <h3 style=\"margin:0;font-family:var(--font-heading);font-weight:600;font-size:23px\">Your CxO Online Solutions <span style=\"font-weight:400;color:var(--color-neutral-600)\">— Project Success Manager<\u002Fspan><\u002Fh3>\n          <span style=\"font-size:15px;color:var(--color-neutral-600)\">2023–24<\u002Fspan>\n        <\u002Fdiv>\n        <p style=\"margin:12px 0 0;font-size:16.5px;line-height:1.6;max-width:42em\">Promoted to PM in 3 months, reporting to the CEO. Drove a 15% satisfaction lift and 22% fewer support tickets during a period of 10% MRR growth.<\u002Fp>\n        <sc-if value=\"{{ showDem }}\" hint-placeholder-val=\"{{ true }}\">\n          <p style=\"margin:10px 0 0;font-size:15px;font-style:italic;color:var(--color-accent-700)\">Demonstrates: customer success, cross-functional delivery, stakeholder management.<\u002Fp>\n        <\u002Fsc-if>\n      <\u002Farticle>\n\n      <article>\n        <div style=\"display:flex;justify-content:space-between;align-items:baseline;gap:20px;flex-wrap:wrap\">\n          <h3 style=\"margin:0;font-family:var(--font-heading);font-weight:600;font-size:23px\">CareerLabs Technologies <span style=\"font-weight:400;color:var(--color-neutral-600)\">— Senior Operations Associate<\u002Fspan><\u002Fh3>\n          <span style=\"font-size:15px;color:var(--color-neutral-600)\">2021–23<\u002Fspan>\n        <\u002Fdiv>\n        <p style=\"margin:12px 0 0;font-size:16.5px;line-height:1.6;max-width:42em\">Lifted program completion 64% via customer research identifying 6 drop-off points. Influenced the product roadmap by analyzing conversion data across 8 programs.<\u002Fp>\n        <sc-if value=\"{{ showDem }}\" hint-placeholder-val=\"{{ true }}\">\n          <p style=\"margin:10px 0 0;font-size:15px;font-style:italic;color:var(--color-accent-700)\">Demonstrates: customer research, data-to-decision, roadmap influence.<\u002Fp>\n        <\u002Fsc-if>\n      <\u002Farticle>\n    <\u002Fdiv>\n\n    <div style=\"display:flex;flex-wrap:wrap;gap:10px;margin-top:52px\">\n      <span class=\"tag tag-neutral\">GTM strategy<\u002Fspan>\n      <span class=\"tag tag-neutral\">Customer insights &amp; market research<\u002Fspan>\n      <span class=\"tag tag-neutral\">Cross-functional leadership<\u002Fspan>\n      <span class=\"tag tag-neutral\">Project &amp; program management<\u002Fspan>\n      <span class=\"tag tag-neutral\">AI-driven process automation<\u002Fspan>\n    <\u002Fdiv>\n\n    <div style=\"display:flex;gap:26px;margin-top:36px;font-size:17px\">\n      <a href=\"files/Shrikant_Naik_Resume_PMM.pdf\" download=\"Shrikant_Naik_Resume_PMM.pdf\">Download full CV →<\u002Fa>\n      <a href=\"https://www.linkedin.com/in/shrikantnaik-/\" target=\"_blank\" rel=\"noopener\">LinkedIn →<\u002Fa>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <footer data-screen-label=\"Footer\" style=\"margin-top:130px;border-top:1px solid var(--color-text);border-bottom:3px solid var(--color-text)\">\n    <div style=\"display:flex;justify-content:space-between;align-items:baseline;gap:20px;flex-wrap:wrap;padding:14px 2px 16px;font-size:14.5px\">\n      <span><span style=\"font-weight:600\">Shrikant Naik<\u002Fspan> <span style=\"color:var(--color-neutral-600)\">— Product marketing &amp; GTM<\u002Fspan><\u002Fspan>\n      <span style=\"color:var(--color-neutral-700)\"><a href=\"mailto:shrikantnaik6@gmail.com\">shrikantnaik6@gmail.com<\u002Fa> · <a href=\"https://www.linkedin.com/in/shrikantnaik-/\" target=\"_blank\" rel=\"noopener\">LinkedIn<\u002Fa> · Dubai<\u002Fspan>\n    <\u002Fdiv>\n  <\u002Ffooter>\n  <div style=\"height:56px\"><\u002Fdiv>\n\n<\u002Fdiv>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\" data-props=\"{&quot;revealContext&quot;:{&quot;editor&quot;:&quot;boolean&quot;,&quot;default&quot;:false,&quot;tsType&quot;:&quot;boolean&quot;,&quot;section&quot;:&quot;Proof bento&quot;},&quot;showDemonstrates&quot;:{&quot;editor&quot;:&quot;boolean&quot;,&quot;default&quot;:true,&quot;tsType&quot;:&quot;boolean&quot;,&quot;section&quot;:&quot;Experience&quot;}}\">\nclass Component extends DCLogic {\n  state = { active: null, slide: 0, acc: 0 };\n  SLIDES = 2;\n\n  accItem(i) {\n    const open = this.state.acc === i;\n    return {\n      open,\n      toggle: () => this.setState((s) => ({ acc: s.acc === i ? -1 : i })),\n      headStyle: {\n        display: 'flex', alignItems: 'center', justifyContent: 'space-between', gap: '16px',\n        width: '100%', padding: '18px 0', background: 'none', border: 'none', cursor: 'pointer',\n        textAlign: 'left', color: 'var(--color-text)', fontFamily: 'var(--font-body)'\n      },\n      signStyle: {\n        fontFamily: 'var(--font-heading)', fontSize: '26px', lineHeight: 1, color: 'var(--color-accent-700)',\n        transform: open ? 'rotate(45deg)' : 'none', transition: 'transform .3s ease', flex: '0 0 auto'\n      },\n      bodyStyle: {\n        overflow: 'hidden', maxHeight: open ? '460px' : '0px', opacity: open ? 1 : 0,\n        transition: 'max-height .4s ease, opacity .3s ease'\n      }\n    };\n  }\n\n  goTo(n) {\n    const slide = Math.max(0, Math.min(this.SLIDES - 1, n));\n    this.setState({ slide });\n  }\n\n  onTouchStart = (e) => { this._tx = e.changedTouches[0].clientX; };\n  onTouchEnd = (e) => {\n    if (this._tx == null) return;\n    const dx = e.changedTouches[0].clientX - this._tx;\n    this._tx = null;\n    if (Math.abs(dx) > 40) this.goTo(this.state.slide + (dx < 0 ? 1 : -1));\n  };\n\n  arrowStyle(side, disabled) {\n    return {\n      position: 'absolute', top: '50%', transform: 'translateY(-50%)',\n      [side]: '-4px', width: '112px', height: '112px', borderRadius: '999px', fontSize: '44px',\n      opacity: disabled ? 0.3 : 1, pointerEvents: disabled ? 'none' : 'auto',\n      zIndex: 2\n    };\n  }\n\n  tile(i) {\n    const reveal = this.props.revealContext ?? false;\n    const on = reveal || this.state.active === i;\n    return {\n      enter: () => this.setState({ active: i }),\n      leave: () => this.setState({ active: null }),\n      toggle: () => this.setState((s) => ({ active: s.active === i ? null : i })),\n      ctxStyle: {\n        opacity: on ? 1 : 0,\n        transform: on ? 'none' : 'translateY(6px)',\n        transition: 'opacity .3s ease, transform .3s ease'\n      }\n    };\n  }\n\n  renderVals() {\n    const slide = this.state.slide;\n    const dots = Array.from({ length: this.SLIDES }, (_, i) => ({\n      label: 'Go to slide ' + (i + 1),\n      selected: i === slide,\n      go: () => this.goTo(i),\n      style: {\n        width: i === slide ? '26px' : '10px',\n        height: '10px',\n        padding: 0,\n        border: 'none',\n        borderRadius: '999px',\n        cursor: 'pointer',\n        background: i === slide ? 'var(--color-accent)' : 'var(--color-neutral-300)',\n        transition: 'width .3s ease, background .2s ease'\n      }\n    }));\n    return {\n      t0: this.tile(0),\n      t1: this.tile(1),\n      t2: this.tile(2),\n      t3: this.tile(3),\n      showDem: this.props.showDemonstrates ?? true,\n      counterText: (slide + 1) + ' / ' + this.SLIDES,\n      trackStyle: {\n        display: 'flex',\n        transform: 'translateX(-' + (slide * 100) + '%)',\n        transition: 'transform .45s cubic-bezier(.22,.61,.36,1)',\n        alignItems: 'flex-start'\n      },\n      dots,\n      prev: () => this.goTo(slide - 1),\n      next: () => this.goTo(slide + 1),\n      prevArrowStyle: this.arrowStyle('left', slide === 0),\n      nextArrowStyle: this.arrowStyle('right', slide === this.SLIDES - 1),\n      onTouchStart: this.onTouchStart,\n      onTouchEnd: this.onTouchEnd,\n      a0: this.accItem(0),\n      a1: this.accItem(1),\n      a2: this.accItem(2),\n      a3: this.accItem(3)\n    };\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
